<html>

<body style="font: size 2em">
  <div style="font-size: 100px">原内容1111111111111111111</div>
  <!-- 导入依赖包，也可以不加，不过需要监听AutoxJsBridgeReady事件后才能使用$autox -->
  <button onclick="btn1('点击了按钮')">btn1</button>
  <script src="autox://sdk.v1.js"></script>
  <script>
    function addText(text) {
      const div = document.createElement("div");
      div.innerHTML = text;
      document.body.appendChild(div);
    }



    function btn1(params) {
      //调用安卓端
      $autox.callHandler("test", "web调用数据11111", (data) => {
        console.log(data)
        addText("安卓回调, data:" + data);
      });

    }


    document.addEventListener("AutoxJsBridgeReady", () => {
      //$autox.
    });
  </script>
</body>

</html>
